name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Terraform Apply
        run: |
          cd infra/
          terraform init
          terraform apply -auto-approve
          
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name payment-system
          kubectl apply -f k8s/