name: Bug report
description: Report reproducible incorrect behavior in an existing example
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, real payment data, or security vulnerabilities. Report vulnerabilities privately as described in SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps and synthetic input data.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Commit or version
      placeholder: Commit SHA or branch name
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, language/runtime versions, and relevant service versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
